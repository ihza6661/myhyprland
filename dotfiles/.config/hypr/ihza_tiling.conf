# # Close windows
bindd = SUPER, Q, Close active window, killactive,
bindd = SUPER, END, Close active window, killactive,
# bindc = , mouse:274, killactive # Middle click on a window to close it 
bind = SUPER+CTRL, Q, exec, hyprctl kill # Forcefully zap a window 
bind = SUPER SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances
bindd = CTRL ALT, DELETE, Close all Windows, exec, omarchy-hyprland-window-close-all

# # Control tiling
bindd = SUPER, J, Toggle split, togglesplit, # dwindle
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
# bind = SUPER, G, togglegroup
bind = SUPER, bracketleft, changegroupactive, b
bind = SUPER, bracketright, changegroupactive, f
bindd = SUPER, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop

# named workspaces
workspace = 11, defaultName:B
workspace = 12, defaultName:M
workspace = 13, defaultName:E
workspace = 14, defaultName:Y
workspace = 15, defaultName:G
workspace = 16, defaultName:I
workspace = 17, defaultName:W
workspace = 18, defaultName:V
workspace = 19, defaultName:K
workspace = 20, defaultName:A
workspace = 21, defaultName:O
workspace = 22, defaultName:C
workspace = 23, defaultName:Q

bind = SUPER CTRL, B, movetoworkspacesilent, 11
bind = SUPER SHIFT, B, workspace, 11
bind = SUPER SHIFT, M, workspace, 12
bind = SUPER CTRL, M, movetoworkspacesilent, 12
bind = SUPER SHIFT, E, workspace, 13
bind = SUPER CTRL, E, movetoworkspacesilent, 13
bind = SUPER SHIFT, Y, workspace, 14
bind = SUPER CTRL, Y, movetoworkspacesilent, 14
bind = SUPER SHIFT, G, workspace, 15
bind = SUPER CTRL, G, movetoworkspacesilent, 15
bind = SUPER SHIFT, I, workspace, 16
bind = SUPER CTRL, I, movetoworkspacesilent, 16
bind = SUPER CTRL, W, movetoworkspacesilent, 17
bind = SUPER SHIFT, W, workspace, 17
bind = SUPER CTRL, V, movetoworkspacesilent, 18
bind = SUPER SHIFT, V, workspace, 18
bind = SUPER CTRL, K, movetoworkspacesilent, 19
bind = SUPER SHIFT, K, workspace, 19
bind = SUPER CTRL, A, movetoworkspacesilent, 20
bind = SUPER SHIFT, A, workspace, 20
bind = SUPER CTRL, O, movetoworkspacesilent, 21
bind = SUPER SHIFT, O, workspace, 21
bind = SUPER CTRL, C, movetoworkspacesilent, 22
bind = SUPER SHIFT, C, workspace, 22
bind = SUPER CTRL, Q, movetoworkspacesilent, 23
bind = SUPER SHIFT, Q, workspace, 23

# Control scratchpad
bind = SUPER CTRL, Up, movetoworkspacesilent, special:up
bind = SUPER SHIFT, Up, togglespecialworkspace, up

bind = SUPER CTRL, Down, movetoworkspacesilent, special:down
bind = SUPER SHIFT, Down, togglespecialworkspace, down

# bindd = SUPER, T, Toggle floating, togglefloating,
# Toggle focused window between normal and 1280x720 centered
bind = SUPER, T, exec, hyprctl dispatch togglefloating && \
    hyprctl dispatch resizeactive exact 1280 720 && \
    hyprctl dispatch centerwindow


bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
# bindd = SUPER SHIFT, F, Spoof Fullscreen, fullscreenstate, 0 3
bindd = SUPER, D, Maximize, fullscreen, 1
bind = SUPER SHIFT, T, workspaceopt, allfloat # Toggle all windows into floating mode

# # Move focus with SUPER + arrow keys
bindd = SUPER, left, Move focus left, movefocus, l
bindd = SUPER, right, Move focus right, movefocus, r
bindd = SUPER, up, Move focus up, movefocus, u
bindd = SUPER, down, Move focus down, movefocus, d


bind = SUPER, HOME, workspace, 1
# Workspaces
bind = SUPER, 1, workspace, 1  # Open workspace 1
bind = SUPER, 2, workspace, 2  # Open workspace 2
bind = SUPER, 3, workspace, 3  # Open workspace 3
bind = SUPER, 4, workspace, 4  # Open workspace 4
bind = SUPER, 5, workspace, 5  # Open workspace 5
bind = SUPER, 6, workspace, 6  # Open workspace 6
bind = SUPER, 7, workspace, 7  # Open workspace 7
bind = SUPER, 8, workspace, 8  # Open workspace 8
bind = SUPER, 9, workspace, 9  # Open workspace 9
bind = SUPER, 0, workspace, 10 # Open workspace 10


bind = SUPER SHIFT, HOME, movetoworkspace, 1
# # Move active window to a workspace with SUPER + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1  # Move active window to workspace 1
bind = SUPER SHIFT, 2, movetoworkspace, 2  # Move active window to workspace 2
bind = SUPER SHIFT, 3, movetoworkspace, 3  # Move active window to workspace 3
bind = SUPER SHIFT, 4, movetoworkspace, 4  # Move active window to workspace 4
bind = SUPER SHIFT, 5, movetoworkspace, 5  # Move active window to workspace 5
bind = SUPER SHIFT, 6, movetoworkspace, 6  # Move active window to workspace 6
bind = SUPER SHIFT, 7, movetoworkspace, 7  # Move active window to workspace 7
bind = SUPER SHIFT, 8, movetoworkspace, 8  # Move active window to workspace 8
bind = SUPER SHIFT, 9, movetoworkspace, 9  # Move active window to workspace 9
bind = SUPER SHIFT, 0, movetoworkspace, 10 # Move active window to workspace 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
bindd = SUPER SHIFT ALT, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT ALT, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT ALT, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT ALT, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT ALT, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT ALT, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT ALT, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT ALT, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT ALT, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT ALT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# # Tab between workspaces
bindd = SUPER, TAB, Next workspace, workspace, e+1
bindd = SUPER SHIFT, TAB, Previous workspace, workspace, e-1
bindd = SUPER CTRL, TAB, Former workspace, workspace, previous

# # Cycle through applications on active workspace
bindd = ALT, Tab, Cycle to next window, cyclenext
bindd = ALT SHIFT, Tab, Cycle to prev window, cyclenext, prev
bindd = ALT, Tab, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, Tab, Reveal active window on top, bringactivetotop

# # Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER ALT, left, Swap window to the left, swapwindow, l
bindd = SUPER ALT, right, Swap window to the right, swapwindow, r
bindd = SUPER ALT, up, Swap window up, swapwindow, u
bindd = SUPER ALT, down, Swap window down, swapwindow, d

# bind = Super+Alt, Left, movewindow, l # [hidden]
# bind = Super+Alt, Right, movewindow, r # [hidden]
# bind = Super+Alt, Up, movewindow, u # [hidden]
# bind = Super+Alt, Down, movewindow, d # [hidden]

# # Resize active window
# binde = SUPER, Semicolon, splitratio, -0.1 # adjust split ratio
# binde = SUPER, Apostrophe, splitratio, +0.1 # adjust split ratio
# binde = SUPER, F1, splitratio, -0.1   # adjust split ratio
# binde = SUPER, F2, splitratio, +0.1   # adjust split ratio
# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# # Scroll through existing workspaces with SUPER + scroll
bindd = SUPER, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER, mouse_up, Scroll active workspace backward, workspace, e-1

# # Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# #/# bind = Super+Shift, Scroll ↑/↓,, # Send to workspace left/right
bind = Super+Shift, mouse_down, movetoworkspace, r-1 # [hidden]
bind = Super+Shift, mouse_up, movetoworkspace, r+1 # [hidden]

#/# bind = Super+Shift, Page_↑/↓,, # Send to workspace left/right
bind = Super+Shift, Page_Down, movetoworkspace, r+1  # [hidden]
bind = Super+Shift, Page_Up, movetoworkspace, r-1  # [hidden]


#/# move window to left/right workspaces
bind = SUPER SHIFT, right,  movetoworkspace, r+1
bind = SUPER SHIFT, left,  movetoworkspace, r-1


#/# bind = Ctrl+Super, ←/→,, # Focus existing left/right
bind = CTRL SUPER, Right, workspace, e+1 # [hidden]
bind = CTRL SUPER, Left, workspace, e-1 # [hidden]

#/# bind = Super, Page_↑/↓,, # Focus left/right
bind = SUPER, Page_Down, workspace, +1 # [hidden]
bind = SUPER, Page_Up, workspace, -1 # [hidden]

bind = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/toggle-mic


#Toggle GTK Theme
# bind = SUPER Alt, P, exec, ~/.config/hypr/scripts/toggle-gtk-theme.sh 

# Toggle dock
# bind = SUPER Shift, D, exec, ~/.config/hypr/scripts/toggle-dock.sh  
# bind = SUPER+ctrl, D, exec, ~/.local/bin/toggle-dock.sh

# brightness
# bindle= CTRL ALT, right, exec, qs ipc call brightness increment || brightnessctl s 2%+ # [hidden]
# bindle= CTRL ALT, left, exec, qs ipc call brightness decrement || brightnessctl s 2%- # [hidden]

# waybar
# bind = SUPER SHIFT, B, exec, ~/.config/waybar/launch.sh # Reload waybar
# bind = SUPER CTRL, B, exec, ~/.config/waybar/toggle.sh  # Toggle waybar



# Enter Window Edit Mode
bind = SUPER, X, submap, winedit

submap = winedit
# --- Move active window with arrow keys ---
binde = , left,  moveactive, -10 0
binde = , right, moveactive, 10 0
binde = , up,    moveactive, 0 -10
binde = , down,  moveactive, 0 10

# --- Resize active window with SHIFT + arrows ---
binde = SHIFT, left,  resizeactive, -10 0
binde = SHIFT, right, resizeactive, 10 0
binde = SHIFT, up,    resizeactive, 0 -10
binde = SHIFT, down,  resizeactive, 0 10

# Exit Window Edit Mode
bind = , escape, submap, reset
bind = , return, submap, reset

# Back to normal keybinds
submap = reset

$HYPRSCRIPTS = ~/.config/hypr/scripts

bind = SUPER CTRL, 1, exec, $HYPRSCRIPTS/moveTo.sh 1  # Move all windows to workspace 1
bind = SUPER CTRL, 2, exec, $HYPRSCRIPTS/moveTo.sh 2  # Move all windows to workspace 2
bind = SUPER CTRL, 3, exec, $HYPRSCRIPTS/moveTo.sh 3  # Move all windows to workspace 3
bind = SUPER CTRL, 4, exec, $HYPRSCRIPTS/moveTo.sh 4  # Move all windows to workspace 4
bind = SUPER CTRL, 5, exec, $HYPRSCRIPTS/moveTo.sh 5  # Move all windows to workspace 5
bind = SUPER CTRL, 6, exec, $HYPRSCRIPTS/moveTo.sh 6  # Move all windows to workspace 6
bind = SUPER CTRL, 7, exec, $HYPRSCRIPTS/moveTo.sh 7  # Move all windows to workspace 7
bind = SUPER CTRL, 8, exec, $HYPRSCRIPTS/moveTo.sh 8  # Move all windows to workspace 8
bind = SUPER CTRL, 9, exec, $HYPRSCRIPTS/moveTo.sh 9  # Move all windows to workspace 9
bind = SUPER CTRL, 0, exec, $HYPRSCRIPTS/moveTo.sh 10 # Move all windows to workspace 10



#/# bindl = Mouse side buttons to switch workspaces
bindl=,mouse:275,exec,hyprctl dispatch workspace -1 # BTN_SIDE
bindl=,mouse:276,exec,hyprctl dispatch workspace +1 # BTN_EXTRA



bindd = SUPER, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle


# Cycle monitor scaling
bindd = SUPER, Slash, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
